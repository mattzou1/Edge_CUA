<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECUA — Edge Computer Use Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; color: #fff; }
    header span { font-size: 0.8rem; color: #666; }

    .task-bar {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .task-input-wrap { flex: 1; min-width: 240px; }

    textarea#task {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      padding: 10px 12px;
      font-size: 0.9rem;
      resize: none;
      height: 42px;
      line-height: 1.4;
      transition: border-color 0.2s;
    }
    textarea#task:focus { outline: none; border-color: #555; }

    .char-count {
      font-size: 0.75rem;
      color: #555;
      text-align: right;
      margin-top: 2px;
    }
    .char-count.warn { color: #f59e0b; }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-run   { background: #2563eb; color: #fff; }
    .btn-cancel { background: #dc2626; color: #fff; display: none; }

    .status-bar {
      padding: 8px 24px;
      font-size: 0.8rem;
      background: #141414;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-pill {
      padding: 3px 10px;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .pill-idle      { background: #2a2a2a; color: #888; }
    .pill-running   { background: #1d4ed8; color: #93c5fd; }
    .pill-done      { background: #14532d; color: #86efac; }
    .pill-fail      { background: #7f1d1d; color: #fca5a5; }
    .pill-cancelled { background: #3b3b00; color: #fde68a; }

    .error-banner {
      display: none;
      padding: 10px 24px;
      background: #450a0a;
      color: #fca5a5;
      font-size: 0.85rem;
      border-bottom: 1px solid #7f1d1d;
    }

    .main {
      display: flex;
      flex: 1;
      gap: 0;
    }

    .panel-desktop {
      flex: 1;
      border-right: 1px solid #2a2a2a;
      display: flex;
      flex-direction: column;
    }

    .panel-log {
      width: 340px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .panel-header {
      padding: 10px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      border-bottom: 1px solid #2a2a2a;
    }

    /* noVNC live stream */
    #vnc-frame {
      flex: 1;
      border: none;
      background: #111;
      min-height: 400px;
    }

    /* Fallback screenshot shown when noVNC isn't available */
    .screenshot-fallback {
      display: none;
      flex: 1;
      align-items: center;
      justify-content: center;
      background: #111;
      padding: 16px;
    }
    .screenshot-fallback.show { display: flex; }

    #screenshot {
      max-width: 100%;
      max-height: 500px;
      border-radius: 4px;
      display: none;
    }
    #screenshot.show { display: block; }

    .screenshot-placeholder {
      color: #444;
      font-size: 0.9rem;
      text-align: center;
    }

    /* Action log */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 0.78rem;
      line-height: 1.6;
      color: #aaa;
    }

    .log-entry { padding: 3px 0; border-bottom: 1px solid #1e1e1e; }
    .log-entry .step-num { color: #555; }
    .log-entry .action-text { color: #93c5fd; }
    .log-entry .result-ok  { color: #86efac; }
    .log-entry .result-err { color: #fca5a5; }
    .log-entry .result-done { color: #a78bfa; font-weight: 600; }

    .log-empty { color: #444; font-style: italic; padding: 12px 0; }
  </style>
</head>
<body>

<header>
  <h1>ECUA</h1>
  <span>Edge Computer Use Agent &mdash; Llama 3.2-3B + OmniParser + Docker VM</span>
</header>

<div class="task-bar">
  <div class="task-input-wrap">
    <textarea id="task" placeholder='e.g. "open terminal and type top"' maxlength="500"></textarea>
    <div class="char-count" id="char-count">0 / 500</div>
  </div>
  <div style="display:flex;gap:8px;align-items:flex-start;padding-top:0">
    <input id="steps" type="number" min="1" max="10" value="5"
           style="width:60px;background:#1a1a1a;border:1px solid #333;border-radius:6px;
                  color:#e0e0e0;padding:10px 8px;font-size:0.875rem;text-align:center">
    <button class="btn btn-run" id="run-btn" onclick="submitTask()">Run</button>
    <button class="btn btn-cancel" id="cancel-btn" onclick="cancelTask()">Cancel</button>
  </div>
</div>

<div class="error-banner" id="error-banner"></div>

<div class="status-bar">
  <span class="status-pill pill-idle" id="status-pill">idle</span>
  <span id="step-info" style="color:#555"></span>
</div>

<div class="main">
  <!-- Left: live desktop -->
  <div class="panel-desktop">
    <div class="panel-header">Live Desktop (noVNC)</div>

    <!-- noVNC iframe -- connects to websockify bridge on port 6080 -->
    <iframe id="vnc-frame"
      src="http://localhost:6080/static/vnc.html?autoconnect=true&resize=scale&show_dot=true&view_only=false"
      allowfullscreen>
    </iframe>

    <!-- Fallback: screenshot polling when noVNC is unavailable -->
    <div class="screenshot-fallback" id="screenshot-fallback">
      <div>
        <div class="screenshot-placeholder" id="screenshot-placeholder">
          Waiting for first screenshot...
        </div>
        <img id="screenshot" alt="Agent screenshot">
      </div>
    </div>
  </div>

  <!-- Right: action log -->
  <div class="panel-log">
    <div class="panel-header">Action Log</div>
    <div id="log"><div class="log-empty">No actions yet.</div></div>
  </div>
</div>

<script>
  // ---------------------------------------------------------------------------
  // noVNC fallback detection
  // After 3s, if the iframe failed to load (no VNC bridge), show screenshot panel
  // ---------------------------------------------------------------------------
  const vncFrame = document.getElementById('vnc-frame');
  const vncFallback = document.getElementById('screenshot-fallback');
  let vncOk = false;

  vncFrame.addEventListener('load', () => { vncOk = true; });
  setTimeout(() => {
    if (!vncOk) {
      vncFrame.style.display = 'none';
      vncFallback.classList.add('show');
    }
  }, 3000);

  // ---------------------------------------------------------------------------
  // Character count
  // ---------------------------------------------------------------------------
  const taskEl = document.getElementById('task');
  const charCount = document.getElementById('char-count');
  taskEl.addEventListener('input', () => {
    const n = taskEl.value.length;
    charCount.textContent = `${n} / 500`;
    charCount.classList.toggle('warn', n > 450);
  });

  // ---------------------------------------------------------------------------
  // Submit
  // ---------------------------------------------------------------------------
  async function submitTask() {
    const task = taskEl.value.trim();
    if (!task) { showError('Task cannot be empty.'); return; }
    hideError();

    const maxSteps = parseInt(document.getElementById('steps').value) || 5;

    let resp;
    try {
      resp = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ task, max_steps: maxSteps }),
      });
    } catch (e) {
      showError(`Network error: ${e.message}`);
      return;
    }

    if (!resp.ok) {
      const body = await resp.json().catch(() => ({}));
      showError(body.detail || `Error ${resp.status}`);
      return;
    }

    setRunning(true);
    poll();
  }

  // ---------------------------------------------------------------------------
  // Cancel
  // ---------------------------------------------------------------------------
  async function cancelTask() {
    await fetch('/cancel', { method: 'POST' }).catch(() => {});
  }

  // ---------------------------------------------------------------------------
  // Polling
  // ---------------------------------------------------------------------------
  let _pollTimer = null;

  async function poll() {
    let s;
    try {
      s = await (await fetch('/status')).json();
    } catch (e) {
      _pollTimer = setTimeout(poll, 2000);
      return;
    }

    updateUI(s);

    if (s.status === 'running') {
      _pollTimer = setTimeout(poll, 1500);
    } else {
      setRunning(false);
    }
  }

  // ---------------------------------------------------------------------------
  // UI update
  // ---------------------------------------------------------------------------
  function updateUI(s) {
    // Status pill
    const pill = document.getElementById('status-pill');
    const statusMap = {
      idle: 'pill-idle',
      running: 'pill-running',
      done: 'pill-done',
      fail: 'pill-fail',
      cancelled: 'pill-cancelled',
    };
    pill.className = 'status-pill ' + (statusMap[s.status] || 'pill-idle');
    pill.textContent = s.status;

    // Step info
    const stepInfo = document.getElementById('step-info');
    if (s.status === 'running' && s.max_steps) {
      stepInfo.textContent = `Step ${s.step + 1} / ${s.max_steps}`;
    } else if (s.task) {
      stepInfo.textContent = s.task.slice(0, 60) + (s.task.length > 60 ? '…' : '');
    } else {
      stepInfo.textContent = '';
    }

    // Screenshot fallback
    if (s.screenshot_b64 && !vncOk) {
      const img = document.getElementById('screenshot');
      img.src = 'data:image/png;base64,' + s.screenshot_b64;
      img.classList.add('show');
      document.getElementById('screenshot-placeholder').style.display = 'none';
    }

    // Action log
    renderLog(s.actions || []);
  }

  function renderLog(actions) {
    const logEl = document.getElementById('log');
    if (!actions.length) {
      logEl.innerHTML = '<div class="log-empty">No actions yet.</div>';
      return;
    }
    logEl.innerHTML = actions.map(a => {
      const resultClass = a.result === 'OK' ? 'result-ok'
                        : (a.result === 'done' || a.result === 'DONE') ? 'result-done'
                        : a.result.startsWith('ERROR') ? 'result-err'
                        : 'result-ok';
      return `<div class="log-entry">
        <span class="step-num">Step ${a.step}:</span>
        <span class="action-text"> ${escHtml(a.action)}</span>
        <span class="${resultClass}"> → ${escHtml(a.result)}</span>
      </div>`;
    }).join('');
    logEl.scrollTop = logEl.scrollHeight;
  }

  function setRunning(running) {
    document.getElementById('run-btn').disabled = running;
    document.getElementById('cancel-btn').style.display = running ? 'inline-block' : 'none';
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function hideError() {
    document.getElementById('error-banner').style.display = 'none';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  // Resume polling if agent is already running on page load
  fetch('/status').then(r => r.json()).then(s => {
    updateUI(s);
    if (s.status === 'running') {
      setRunning(true);
      poll();
    }
  }).catch(() => {});
</script>
</body>
</html>
